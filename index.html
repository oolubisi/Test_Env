<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>FieldScan Pro</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main">
  <!-- Top Bar -->
  <div class="page-header">
    <div class="header-group">
      <button class="home-btn" onclick="showPage('dashboard')"><i class="fas fa-home"></i></button>
      <h2>FieldScan<span style="font-weight:400"> Pro</span></h2>
    </div>
    <div id="sync-status" style="background:#000; color:#fff; padding:6px 10px; border-radius:20px; font-size:12px; font-weight:800; display:none;"></div>
  </div>

  <!-- Segment Bar (Dashboard, Vendors, Reports, Sync, Refresh) -->
  <div class="segment-bar">
    <button class="segment-btn" onclick="showPage('dashboard')"><i class="fas fa-chart-line"></i> Projects</button>
    <button class="segment-btn" onclick="showPage('vendors')"><i class="fas fa-truck"></i> Vendors</button>
    <button class="segment-btn" onclick="showPage('reports')"><i class="fas fa-file-alt"></i> Reports</button>
    <button id="sync-now-btn" class="segment-btn sync-btn" onclick="triggerManualSync()"><i class="fas fa-sync-alt"></i> Sync Now <span id="sync-pending-badge" class="sync-count-badge" style="display:none;">0</span></button>
    <button id="refresh-data-btn" class="segment-btn" onclick="refreshAllData()"><i class="fas fa-database"></i> Refresh</button>
  </div>

  <!-- Dashboard View (Projects) -->
  <div id="view-dashboard" class="page-view active-view">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
      <input type="text" id="search-projects" placeholder="Search client or project ID..." style="flex:1; font-size:16px;">
      <button class="action-btn" style="width:auto; padding:0 20px;" onclick="openModal('project', null)"><i class="fas fa-plus"></i> New</button>
    </div>
    <div id="project-master-list"></div>
  </div>

  <!-- Vendors View -->
  <div id="view-vendors" class="page-view">
    <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
      <input type="text" id="search-vendor" placeholder="Search vendor..." style="flex:2; font-size:16px;">
      <select id="filter-vendor-trade" style="flex:1; font-size:16px;"></select>
      <button class="action-btn" style="width:auto; padding:0 20px;" onclick="openModal('vendor', null)"><i class="fas fa-plus"></i> Add</button>
    </div>
    <div id="vendor-master-list"></div>
  </div>

  <!-- Reports View -->
  <div id="view-reports" class="page-view">
    <div class="card">
      <label>Select Project</label>
      <select id="rep-project-sel" onchange="handleReportOptionsPopulation()"></select>
      <label>Report Template</label>
      <select id="rep-template-sel"></select>
      <button class="action-btn" style="margin-top:15px;" onclick="compileFieldReport()">Generate Report</button>
    </div>
    <div id="report-onscreen-preview-card" class="card" style="display:none;">
      <div id="report-preview-viewport"></div>
      <button class="action-btn" style="margin-top:15px;" onclick="window.print()"><i class="fas fa-print"></i> Print / PDF</button>
    </div>
    <div id="report-print-container" style="display:none;"></div>
  </div>

  <!-- Project Console (shown when a project is clicked) -->
  <div id="view-project-console" class="page-view">
    <div class="page-header" style="margin-bottom:10px; padding-bottom:10px;">
      <div>
        <button class="home-btn" onclick="showPage('dashboard')" style="width:40px; height:40px;"><i class="fas fa-arrow-left"></i></button>
      </div>
      <div style="text-align:right;">
        <div id="console-title-text" style="font-weight:800; font-size:20px;"></div>
        <button style="background:none; border:none; font-size:12px;" onclick="triggerEditProjectProfile()"><i class="fas fa-edit"></i> Edit Project</button>
      </div>
    </div>
    <div class="segment-bar" style="margin-bottom:10px;">
      <button class="segment-btn" id="seg-btn-profile" onclick="switchConsoleSegment('profile')">Profile</button>
      <button class="segment-btn" id="seg-btn-inspections" onclick="switchConsoleSegment('inspections')">Inspections</button>
      <button class="segment-btn" id="seg-btn-takeoff" onclick="switchConsoleSegment('takeoff')">Take‑Off</button>
      <button class="segment-btn" id="seg-btn-progress" onclick="switchConsoleSegment('progress')">Progress</button>
      <button class="segment-btn" id="seg-btn-workorders" onclick="switchConsoleSegment('workorders')">Work Orders</button>
      <button class="segment-btn" id="seg-btn-payments" onclick="switchConsoleSegment('payments')">Payments</button>
    </div>
    <div id="console-seg-profile" class="console-tab-window page-view">
      <div class="card">
        <div><strong>Client:</strong> <span id="c-meta-name"></span></div>
        <div><strong>Location:</strong> <span id="c-meta-loc"></span></div>
        <div><strong>Phone:</strong> <a id="c-meta-phone" href="#"></a></div>
        <div><strong>Notes:</strong> <textarea id="c-meta-notes" rows="3" readonly style="background:#f5f5f5;"></textarea></div>
      </div>
    </div>
    <div id="console-seg-inspections" class="console-tab-window page-view">
      <div id="console-inspections-list"></div>
      <button class="action-btn" style="margin-top:10px;" onclick="openModal('inspection', null)">+ New Inspection</button>
    </div>
    <div id="console-seg-takeoff" class="console-tab-window page-view">
      <div id="console-takeoff-list"></div>
      <button class="action-btn" style="margin-top:10px;" onclick="openModal('takeoff_item', null)">+ New Take‑Off</button>
    </div>
    <div id="console-seg-progress" class="console-tab-window page-view">
      <div id="console-progress-feed"></div>
      <button class="action-btn" style="margin-top:10px;" onclick="openModal('progress_entry', null)">+ Log Progress</button>
    </div>
    <div id="console-seg-workorders" class="console-tab-window page-view">
      <div id="console-workorders-list"></div>
      <button class="action-btn" style="margin-top:10px;" onclick="openModal('workorder', null)">+ New Work Order</button>
    </div>
    <div id="console-seg-payments" class="console-tab-window page-view">
      <div id="console-payments-list"></div>
      <button class="action-btn" style="margin-top:10px;" onclick="openModal('payment', null)">+ Log Payment</button>
    </div>
  </div>

  <!-- Modal Overlay -->
  <div id="modalOverlay" class="modal-overlay">
    <div id="modalContent" class="modal">
      <div style="display:flex; justify-content:space-between;">
        <h3 id="modalTitle">Modal</h3>
        <span onclick="closeModal()" style="font-size:28px; cursor:pointer;">&times;</span>
      </div>
      <div id="modalBody"></div>
      <button id="modalSubmit" class="action-btn" style="margin-top:20px;">Save</button>
    </div>
  </div>
</div>

<!-- Load ES modules entry point -->
<script src="app.bundle.js"></script>
</body>
</html>
